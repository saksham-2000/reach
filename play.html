<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reach — today</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="play">
  <main>
    <nav>
      <span id="who"></span>
      <button id="signout" class="ghost" type="button">sign out</button>
    </nav>

    <section class="score-panel">
      <div class="score-row">
        <div class="score-block">
          <span class="label">score</span>
          <span id="score" class="big">0</span>
        </div>
        <div class="arrow">→</div>
        <div class="score-block">
          <span class="label">target</span>
          <span id="target" class="big">—</span>
        </div>
      </div>
      <div class="streak-row">
        <span id="streak-label">streak: 0</span>
        <span id="status" class="status" aria-live="polite"></span>
      </div>
    </section>

    <section class="card you-card">
      <h2>you, today</h2>
      <p class="sub">share these if someone asks. this is how they "use" you.</p>
      <div class="you-grid">
        <div>
          <span class="label">your value</span>
          <span id="my-value" class="big">—</span>
        </div>
        <div>
          <span class="label">your pin</span>
          <span id="my-pin" class="big mono">· · · ·</span>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>use someone's value</h2>
      <p class="sub">ask a real person. enter their value and pin. then choose.</p>
      <form id="use-form">
        <div class="row">
          <label>
            <span>their value</span>
            <input id="their-value" type="number" min="1" max="9" required />
          </label>
          <label>
            <span>their pin</span>
            <input id="their-pin" type="text" inputmode="numeric"
                   pattern="[0-9 ,-]*" maxlength="14"
                   placeholder="e.g. 3 7 9 2" required />
          </label>
        </div>
        <div class="actions">
          <button type="submit" data-op="add">+ add</button>
          <button type="submit" data-op="sub">− subtract</button>
        </div>
        <p id="use-error" class="error" aria-live="polite" hidden></p>
      </form>
      <button id="concede" class="ghost concede" type="button">give up today</button>
    </section>

    <section class="history" id="history" hidden>
      <h2>today's moves</h2>
      <ul id="history-list"></ul>
    </section>

    <footer>
      <p id="flavor">the only way forward is to ask.</p>
    </footer>
  </main>

  <script src="js/identity.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/play.js"></script>
</body>
</html>
